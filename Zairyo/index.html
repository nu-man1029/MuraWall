<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MURA WALL 材料費シミュレーター | Cement Artist Nu☆Man</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --brand:#f18200; --brand-light:#fff4e6; --brand-dark:#c96800;
  --text:#1a1a1a; --text-sub:#666; --border:#e0e0e0;
  --bg:#f5f5f5; --white:#ffffff;
  --green:#16a34a; --green-light:#f0fdf4;
  --red:#dc2626; --red-light:#fef2f2;
  --yellow:#d97706; --yellow-light:#fffbeb;
  --radius:10px; --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:15px;}

/* ヘッダー */
.hdr{background:var(--brand);color:#fff;padding:13px 16px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(241,130,0,.3);}
.hdr h1{font-size:16px;font-weight:700;}
.hdr p{font-size:11px;opacity:.85;margin-top:2px;}

/* タブ */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);}
.tab{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:600;color:var(--text-sub);cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;transition:.2s;}
.tab.on{color:var(--brand);border-bottom-color:var(--brand);}

/* コンテンツ */
.wrap{max-width:680px;margin:0 auto;padding:14px;}

/* カード */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:15px;margin-bottom:12px;}
.ctitle{font-size:13px;font-weight:700;color:var(--brand);margin-bottom:11px;display:flex;align-items:center;gap:6px;}
.ctitle::before{content:'';display:inline-block;width:4px;height:15px;background:var(--brand);border-radius:2px;}

/* フォーム */
.flabel{font-size:12px;font-weight:600;color:var(--text-sub);margin-bottom:4px;display:block;}
.finput{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;transition:.2s;background:#fff;}
.finput:focus{outline:none;border-color:var(--brand);}
.frow{margin-bottom:11px;}
.frow-2{display:flex;gap:10px;}
.frow-2 .frow{flex:1;}

/* 面積入力 */
.area-wrap{display:flex;align-items:center;gap:8px;}
.area-in{font-size:24px;font-weight:700;text-align:right;width:150px;padding:9px 12px;border:2px solid var(--border);border-radius:8px;color:var(--brand);}
.area-in:focus{outline:none;border-color:var(--brand);}

/* ラジオボタン群 */
.rbg{display:flex;gap:7px;flex-wrap:wrap;}
.rb{flex:1;min-width:65px;padding:9px 6px;border:1.5px solid var(--border);border-radius:8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--text-sub);transition:.2s;}
.rb.on{border-color:var(--brand);background:var(--brand-light);color:var(--brand);}

/* 警告 */
.warn{background:var(--yellow-light);border:1px solid #fbbf24;border-radius:8px;padding:9px 11px;font-size:12px;color:#92400e;margin-top:8px;display:flex;gap:7px;}

/* 材料カード */
.mat-card{border:1.5px solid var(--border);border-radius:9px;margin-bottom:9px;overflow:hidden;}
.mat-head{display:flex;align-items:center;padding:11px 13px;gap:10px;background:#fafafa;}
.mat-name{flex:1;}
.mat-name .name{font-size:14px;font-weight:600;}
.mat-name .size{font-size:11px;color:var(--text-sub);margin-top:1px;}
.mat-name .cov{font-size:11px;color:var(--brand);margin-top:2px;font-weight:600;}
.mat-ctrl{display:flex;align-items:center;gap:6px;}
.qbtn{width:28px;height:28px;border:1.5px solid var(--border);border-radius:6px;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-sub);font-weight:700;flex-shrink:0;}
.qbtn:active{background:var(--brand-light);}
.qinput{font-size:16px;font-weight:700;width:44px;text-align:center;border:1.5px solid var(--brand);border-radius:6px;padding:4px 2px;color:var(--brand);background:#fff;font-family:inherit;}
.qinput:focus{outline:none;}
.qunit{font-size:12px;color:var(--text-sub);flex-shrink:0;}
.mat-price{font-size:14px;font-weight:700;min-width:72px;text-align:right;flex-shrink:0;}

/* カバレッジバー */
.cov-bar-wrap{padding:6px 13px 10px;background:#fafafa;border-top:1px solid var(--border);}
.cov-label{font-size:11px;color:var(--text-sub);margin-bottom:4px;display:flex;justify-content:space-between;}
.cov-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.cov-bar-fill{height:100%;background:var(--brand);border-radius:3px;transition:.3s;}
.cov-bar-fill.over{background:var(--green);}

/* 余り試算 */
.surplus-box{margin:0 13px 11px;background:var(--green-light);border:1px solid #bbf7d0;border-radius:8px;padding:10px 12px;}
.surplus-title{font-size:11px;font-weight:700;color:var(--green);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.surplus-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px dashed #d1fae5;}
.surplus-row:last-of-type{border-bottom:none;}
.surplus-label{color:var(--text-sub);}
.surplus-val{font-weight:600;}
.surplus-val.green{color:var(--green);}
.surplus-val.gray{color:#888;}
.add-stock-btn{margin-top:8px;width:100%;padding:7px;border:1.5px solid var(--green);border-radius:7px;background:#fff;color:var(--green);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.add-stock-btn:active{background:var(--green-light);}

/* 合計ボックス */
.total-box{background:var(--text);color:#fff;border-radius:var(--radius);padding:17px;margin-bottom:12px;}
.ttax{display:flex;gap:6px;margin-bottom:13px;}
.ttax-btn{flex:1;padding:7px;border:1.5px solid #444;border-radius:8px;background:transparent;color:#aaa;font-size:13px;font-weight:600;cursor:pointer;}
.ttax-btn.on{border-color:var(--brand);background:var(--brand);color:#fff;}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.trow .lbl{font-size:13px;opacity:.7;}
.trow .val{font-size:15px;font-weight:700;}
.trow .val.big{font-size:25px;font-weight:800;color:var(--brand);}
.trow .val.green{color:#4ade80;}
.trow .val.muted{opacity:.6;}
.tdiv{border-top:1px solid #444;margin:10px 0;}
.tsqm{font-size:12px;opacity:.6;text-align:right;margin-top:5px;}
.surplus-summary{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:8px;padding:10px;margin:10px 0;}
.surplus-summary .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.surplus-summary .row:last-child{margin-bottom:0;}
.surplus-summary .lbl{opacity:.8;}
.surplus-summary .val{font-weight:700;color:#4ade80;}

/* ボタン */
.btngrp{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;}
.btn{flex:1;min-width:90px;padding:12px 8px;border:none;border-radius:var(--radius);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:.2s;}
.btn-p{background:var(--brand);color:#fff;}
.btn-p:active{background:var(--brand-dark);}
.btn-s{background:#fff;color:var(--brand);border:2px solid var(--brand);}
.btn-s:active{background:var(--brand-light);}
.btn-g{background:#f0f0f0;color:var(--text-sub);}
.btn-g:active{background:#e0e0e0;}

/* 折り畳み */
.coll{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:9px;overflow:hidden;}
.coll-hd{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;cursor:pointer;font-size:14px;font-weight:600;}
.coll-arr{transition:.2s;color:var(--brand);font-size:12px;}
.coll-arr.op{transform:rotate(180deg);}
.coll-bd{padding:0 15px 14px;}

/* 単価表 */
.ptbl{width:100%;border-collapse:collapse;font-size:13px;}
.ptbl th{background:var(--brand-light);color:var(--brand-dark);font-weight:700;padding:7px 9px;text-align:left;border-bottom:2px solid var(--brand);}
.ptbl td{padding:7px 9px;border-bottom:1px solid var(--border);}
.ptbl tr:last-child td{border-bottom:none;}
.ptbl tr:nth-child(even) td{background:#fafafa;}

/* 在庫 */
.stock-item{background:#fff;border:1.5px solid var(--border);border-radius:9px;padding:12px;margin-bottom:9px;}
.stock-item-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.stock-item-name{font-weight:700;font-size:14px;}
.stock-item-size{font-size:11px;color:var(--text-sub);margin-top:2px;}
.stock-del{background:none;border:1.5px solid #fecaca;border-radius:6px;color:var(--red);font-size:12px;padding:4px 8px;cursor:pointer;}
.stock-metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.stock-metric{background:#f9f9f9;border-radius:6px;padding:7px 9px;}
.stock-metric .lbl{font-size:10px;color:var(--text-sub);}
.stock-metric .val{font-size:14px;font-weight:700;color:var(--green);}
.stock-sqm-edit{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.stock-sqm-in{width:80px;padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:14px;text-align:right;}
.stock-memo{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:inherit;resize:none;}
.stock-from{font-size:11px;color:var(--text-sub);margin-top:4px;}
.stock-total{background:var(--green-light);border:1px solid #bbf7d0;border-radius:9px;padding:12px;margin-top:4px;}
.stock-total .row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.stock-total .row:last-child{margin-bottom:0;}
.empty{text-align:center;padding:28px 14px;color:var(--text-sub);}
.empty .ico{font-size:32px;margin-bottom:7px;}

/* 施工要領 詳細版 */
.man-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.man-tab{padding:7px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--text-sub);transition:.2s;}
.man-tab.on{border-color:var(--brand);background:var(--brand-light);color:var(--brand);}
.man-section{margin-bottom:20px;}
.man-h1{font-size:15px;font-weight:700;color:var(--text);border-left:4px solid var(--brand);padding-left:10px;margin-bottom:10px;}
.man-h2{font-size:13px;font-weight:700;color:var(--brand-dark);margin:12px 0 6px;display:flex;align-items:center;gap:6px;}
.man-h2::before{content:'▶';font-size:10px;color:var(--brand);}
.flow{display:flex;flex-direction:column;gap:0;margin:10px 0;}
.flow-step{display:flex;align-items:stretch;gap:0;}
.flow-num{width:32px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;}
.flow-circle{width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.flow-line{width:2px;background:var(--brand);opacity:.3;flex:1;margin:0 auto;}
.flow-body{flex:1;padding:0 0 14px 10px;}
.flow-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.flow-desc{font-size:12px;color:var(--text-sub);line-height:1.6;}
.flow-tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700;margin-bottom:5px;}
.flow-tag.mat{background:#fff4e6;color:var(--brand);}
.flow-tag.dry{background:#e0f2fe;color:#0369a1;}
.flow-tag.warn{background:#fef2f2;color:var(--red);}
.mix-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:11px 13px;margin:8px 0;}
.mix-title{font-size:12px;font-weight:700;color:#475569;margin-bottom:8px;}
.mix-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.mix-row:last-child{margin-bottom:0;}
.mix-name{flex:1;font-size:13px;}
.mix-bar-wrap{width:100px;flex-shrink:0;}
.mix-bar{height:8px;border-radius:4px;background:var(--brand);opacity:.8;}
.mix-amt{font-size:12px;font-weight:700;color:var(--brand);min-width:65px;text-align:right;}
.mix-note{font-size:11px;color:var(--text-sub);margin-top:6px;font-style:italic;}
.mix-area{background:var(--brand);color:#fff;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;text-align:center;margin-top:8px;}
.caution{background:#fef2f2;border-left:4px solid var(--red);border-radius:0 8px 8px 0;padding:10px 12px;margin:8px 0;}
.caution-title{font-size:12px;font-weight:700;color:var(--red);margin-bottom:5px;}
.caution li{font-size:12px;color:#7f1d1d;line-height:1.7;margin-left:16px;}
.point{background:#eff6ff;border-left:4px solid #3b82f6;border-radius:0 8px 8px 0;padding:10px 12px;margin:8px 0;}
.point li{font-size:12px;color:#1e3a5f;line-height:1.7;margin-left:16px;}
.spec-tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0;}
.spec-tbl th{background:#334155;color:#fff;padding:7px 9px;text-align:left;font-size:11px;}
.spec-tbl td{padding:7px 9px;border-bottom:1px solid var(--border);}
.spec-tbl tr:nth-child(even) td{background:#f8fafc;}
.dry-badge{display:inline-flex;align-items:center;gap:4px;background:#e0f2fe;color:#0369a1;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;margin-left:6px;}
.mtbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;}
.mtbl th{background:#f0f0f0;padding:5px 7px;text-align:left;font-weight:600;}
.mtbl td{padding:5px 7px;border-bottom:1px solid var(--border);}
.mnote{font-size:12px;color:var(--text-sub);line-height:1.6;background:#f9f9f9;border-radius:6px;padding:9px;}
.mnote li{margin-left:16px;margin-bottom:3px;}
.msec-title{font-size:13px;font-weight:700;color:var(--brand-dark);margin:10px 0 5px;}

/* モーダル */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.mo{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:92vh;overflow-y:auto;padding:18px 15px;}
.mo-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.mo-title{font-size:16px;font-weight:700;}
.mo-close{font-size:24px;cursor:pointer;color:var(--text-sub);background:none;border:none;}

/* 発注書 */
.odoc{border:2px solid var(--text);border-radius:8px;padding:15px;font-size:13px;}
.odoc h2{text-align:center;font-size:15px;margin-bottom:10px;border-bottom:2px solid var(--text);padding-bottom:7px;}
.ometa{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:11px;}
.ometa-item{border:1px solid #ccc;padding:5px 7px;border-radius:4px;}
.ometa-lbl{font-size:10px;color:var(--text-sub);}
.ometa-val{font-weight:600;font-size:13px;}
.otbl{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:9px;}
.otbl th{background:#333;color:#fff;padding:6px 7px;text-align:left;}
.otbl td{padding:6px 7px;border-bottom:1px solid #ddd;}
.otbl tr:nth-child(even) td{background:#f9f9f9;}
.ototal{background:#f5f5f5;border-radius:6px;padding:9px;text-align:right;font-size:14px;font-weight:700;margin-top:7px;}
.onote{border:1px solid #ccc;border-radius:6px;padding:9px;min-height:55px;font-size:12px;color:var(--text-sub);}

@media print{
  .no-print{display:none!important;}
  .mo-ov{position:static;background:none;}
  .mo{max-height:none;border-radius:0;padding:0;}
  body{background:#fff;}
}
@media(min-width:600px){
  .wrap{padding:18px;}
  .area-in{width:180px;font-size:28px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback} = React;

// ============================================================
// 材料マスター（coverage = 1単位あたりの施工可能面積㎡）
// ============================================================
const MAT = {
  pate:        {name:'FCクイックパテ',      unit:'袋',size:'3.5kg/袋',    price:1460,  coverage:62.5, noSurplus:false},
  tape:        {name:'ファイバーテープ',     unit:'巻',size:'50mm×90m/巻',price:1770,  coverage:60,   noSurplus:false},
  under:       {name:'ベストアンダー',       unit:'袋',size:'3.3kg/袋',    price:1770,  coverage:3.3,  noSurplus:false},
  mwMain:      {name:'MURA WALL 主材',      unit:'袋',size:'3.875kg/セット',price:3960, coverage:4.5,  noSurplus:false},
  mwColor:     {name:'MURA WALL カラー',    unit:'袋',size:'100g/袋',      price:780,   coverage:null, noSurplus:true},
  mwFin:       {name:'MURA WALL フィニッシュ',unit:'缶',size:'3kg/缶',    price:9720,  coverage:12.5, noSurplus:false},
  sealerS:     {name:'シーラーW',           unit:'缶',size:'4kg/缶',       price:4320,  coverage:33.3, noSurplus:false},
  sealerL:     {name:'シーラーW',           unit:'缶',size:'15kg/缶',      price:11930, coverage:125,  noSurplus:false},
  exMain:      {name:'MURA WALL EX 主材',   unit:'袋',size:'5.2kg/セット', price:4200,  coverage:4.5,  noSurplus:false},
  exColor:     {name:'MURA WALL EX カラー', unit:'袋',size:'100g/袋',      price:780,   coverage:null, noSurplus:true},
  exFin:       {name:'MURA WALL EX フィニッシュ',unit:'缶',size:'3kg/缶', price:10320, coverage:10,   noSurplus:false},
  clearGlossS: {name:'クリヤー 艶あり',     unit:'缶',size:'2kg/缶',       price:2880,  coverage:10,   noSurplus:false},
  clearGlossL: {name:'クリヤー 艶あり',     unit:'缶',size:'16kg/缶',      price:20520, coverage:80,   noSurplus:false},
  clearMatteS: {name:'クリヤー 艶消し',     unit:'缶',size:'2kg/缶',       price:3600,  coverage:10,   noSurplus:false},
  clearMatteL: {name:'クリヤー 艶消し',     unit:'缶',size:'16kg/缶',      price:26520, coverage:80,   noSurplus:false},
};

// ============================================================
// 計算ロジック
// ============================================================
const ceil = Math.ceil, floor = Math.floor;
const fmt = n => n.toLocaleString('ja-JP');

function calcSealer(area){
  const uS = MAT.sealerS.price/MAT.sealerS.coverage, uL = MAT.sealerL.price/MAT.sealerL.coverage;
  if(uL<=uS){
    const lg=floor(area/125), rem=area-lg*125, sm=rem>0?ceil(rem/33.3):0;
    const rows=[];
    if(lg>0) rows.push({key:'sealerL',mat:MAT.sealerL,qty:lg});
    if(sm>0) rows.push({key:'sealerS',mat:MAT.sealerS,qty:sm});
    return rows;
  }
  return [{key:'sealerS',mat:MAT.sealerS,qty:ceil(area/33.3)}];
}

function calcClear(area,type){
  if(type==='none') return [];
  const sK=type==='gloss'?'clearGlossS':'clearMatteS', lK=type==='gloss'?'clearGlossL':'clearMatteL';
  const lg=floor(area/80), rem=area-lg*80, sm=rem>0?ceil(rem/10):0;
  const rows=[];
  if(lg>0) rows.push({key:lK,mat:MAT[lK],qty:lg});
  if(sm>0) rows.push({key:sK,mat:MAT[sK],qty:sm});
  return rows;
}

function buildSteps(mode,area,clear){
  if(area<=0) return [];
  if(mode==='interior'){
    const mQ=ceil(area/4.5), fQ=ceil(area/12.5);
    return [
      {title:'工程1｜下地処理', rows:[
        {key:'pate',mat:MAT.pate,qty:ceil(area/62.5)},
        {key:'tape',mat:MAT.tape,qty:ceil(area/60)},
      ]},
      {title:'工程2｜下塗り', rows:[
        {key:'under',mat:MAT.under,qty:ceil(area/3.3)},
      ]},
      {title:'工程3｜主材塗り', rows:[
        {key:'mwMain',mat:MAT.mwMain,qty:mQ},
        {key:'mwColor',mat:MAT.mwColor,qty:mQ},
      ]},
      {title:'工程4｜フィニッシュ', rows:[
        {key:'mwFin',mat:MAT.mwFin,qty:fQ},
        {key:'mwColor',mat:MAT.mwColor,qty:fQ},
      ]},
      ...(clear!=='none'?[{title:'工程5｜クリヤー（オプション）',rows:calcClear(area,clear)}]:[]),
    ];
  } else {
    const mQ=ceil(area/4.5), fQ=ceil(area/10);
    return [

// 余り試算
function calcSurplus(row, qty, area){
  const m=row.mat;
  if(m.noSurplus || !m.coverage || qty===0) return null;
  const covTotal = m.coverage * qty;     // 購入で施工可能な面積
  const cost = m.price * qty;            // 購入合計
  if(covTotal <= area) return null;      // 余りなし
  const jobCost = Math.round(cost * area / covTotal);
  const surplusVal = cost - jobCost;
  const surplusSqm = covTotal - area;
  return {covTotal, cost, jobCost, surplusVal, surplusSqm};
}

function calcTotals(steps, overrides, area){
  let purchase=0, jobCost=0, hasSurplus=false;
  steps.forEach(step=>{
    step.rows.forEach(row=>{
      const qty = overrides[row.key]!==undefined ? overrides[row.key] : row.qty;
      const cost = row.mat.price * qty;
      purchase += cost;
      const sp = calcSurplus(row, qty, area);
      if(sp){
        hasSurplus=true;
        jobCost += sp.jobCost;
      } else {
        jobCost += cost;
      }
    });
  });
  return {purchase, jobCost, surplusVal: purchase-jobCost, hasSurplus};
}

    <div className="mix-box">

  );

function StockTab({stocks, setStocks}){
  const updateSqm=(id,val)=>{
    setStocks(prev=>prev.map(s=>s.id===id?{...s,remainSqm:Math.max(0,parseFloat(val)||0)}:s));
  };
  const updateMemo=(id,val)=>{
    setStocks(prev=>prev.map(s=>s.id===id?{...s,memo:val}:s));
  };
  const del=(id)=>{
    if(!confirm('この在庫を削除しますか？')) return;
    setStocks(prev=>prev.filter(s=>s.id!==id));
  };
  const totalSqm=stocks.reduce((s,x)=>s+x.remainSqm,0);
  const totalVal=stocks.reduce((s,x)=>s+Math.round(x.unitValue*x.remainSqm),0);

  return(
    <div>
      {stocks.length>0&&(
        <div className="stock-total" style={{marginBottom:12}}>
          <div className="row"><span>在庫合計面積</span><span style={{fontWeight:700,color:'var(--green)'}}>{totalSqm.toFixed(1)}㎡</span></div>
          <div className="row"><span>在庫残存価値合計</span><span style={{fontWeight:700,color:'var(--green)'}}>¥{fmt(totalVal)}</span></div>
        </div>
      )}
      {stocks.length===0?(
        <div className="empty"><div className="ico">📦</div><div>在庫はありません</div><div style={{fontSize:12,marginTop:4}}>材料リストの「在庫に追加」で登録できます</div></div>
      ):(
        stocks.map(s=>(
          <div className="stock-item" key={s.id}>
            <div className="stock-item-hd">
              <div><div className="stock-item-name">{s.matName}</div><div className="stock-item-size">{s.matSize} / {s.fromSite}</div></div>
              <button className="stock-del" onClick={()=>del(s.id)}>削除</button>
            </div>
            <div className="stock-metrics">
              <div className="stock-metric"><div className="lbl">残り施工可能面積</div><div className="val">{s.remainSqm.toFixed(1)}㎡</div></div>
              <div className="stock-metric"><div className="lbl">残存価値（概算）</div><div className="val">¥{fmt(Math.round(s.unitValue*s.remainSqm))}</div></div>
            </div>
            <div className="stock-sqm-edit">
              <span style={{fontSize:12,color:'var(--text-sub)'}}>残り面積を修正：</span>
              <input className="stock-sqm-in" type="number" min="0" step="0.5" value={s.remainSqm} onChange={e=>updateSqm(s.id,e.target.value)} />
              <span style={{fontSize:12}}>㎡</span>
            </div>
            <textarea className="stock-memo" rows={2} placeholder="メモ（現場名・日付など）" value={s.memo||''} onChange={e=>updateMemo(s.id,e.target.value)} />
            <div className="stock-from" style={{marginTop:4}}>登録日：{s.date}</div>
          </div>
        ))
      )}
    </div>
  );
}

function OrderModal({mode,steps,overrides,field,onClose}){
  const today=new Date().toLocaleDateString('ja-JP');
  const [note,setNote]=useState('');
  const [sample,setSample]=useState(false);

  const [vendor,setVendor]=useState('');
  const [delivDate,setDelivDate]=useState('');
  const [colorNo,setColorNo]=useState('');

  const allRows=[];
  steps.forEach(step=>{
    step.rows.forEach(row=>{
      const qty=overrides[row.key]!==undefined?overrides[row.key]:row.qty;
      if(qty>0) allRows.push({mat:row.mat,qty});
    });
  });
  const totalEx=allRows.reduce((s,r)=>s+r.mat.price*r.qty,0);

  return(
    <div className="mo-ov no-print" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="mo">
        <div className="mo-hd no-print"><div className="mo-title">📋 発注書プレビュー</div><button className="mo-close" onClick={onClose}>×</button></div>
        <div className="odoc" id="order-print">
          <h2>MURA WALL{mode==='exterior'?' EX':''} 現場専用 材料発注書</h2>
          <div style={{textAlign:'right',fontSize:11,marginBottom:7}}>TK-0388　発注日：{today}</div>
          <div className="ometa">
            <div className="ometa-item"><div className="ometa-lbl">御社名</div><div className="ometa-val">株式会社KENSIN</div></div>
            <div className="ometa-item"><div className="ometa-lbl">ご担当者名</div><div className="ometa-val">ぬーまん</div></div>
            <div className="ometa-item"><div className="ometa-lbl">マイスター登録番号</div><div className="ometa-val">{meister||'—'}</div></div>
            <div className="ometa-item"><div className="ometa-lbl">サンプルキット</div><div className="ometa-val">{sample?'要':'不要'}</div></div>
            <div className="ometa-item"><div className="ometa-lbl">施工物件名</div><div className="ometa-val">{field.siteName||'—'}</div></div>
            <div className="ometa-item"><div className="ometa-lbl">施工物件住所</div><div className="ometa-val">{field.siteAddr||'—'}</div></div>
            <div className="ometa-item"><div className="ometa-lbl">送り先・販売店</div><div className="ometa-val">{vendor||'—'}</div></div>
            <div className="ometa-item"><div className="ometa-lbl">希望納期</div><div className="ometa-val">{delivDate||field.delivDate||'—'}</div></div>
          </div>
          <table className="otbl">
            <thead><tr><th>品名</th><th>色No./容量</th><th style={{textAlign:'right'}}>数量</th><th style={{textAlign:'right'}}>金額（税抜）</th></tr></thead>
            <tbody>
              {allRows.map((r,i)=>(
                <tr key={i}><td>{r.mat.name}</td><td>{colorNo&&r.mat.name.includes('カラー')?`No.${colorNo} / `:''}{r.mat.size}</td><td style={{textAlign:'right'}}>{r.qty} {r.mat.unit}</td><td style={{textAlign:'right'}}>¥{fmt(r.mat.price*r.qty)}</td></tr>
              ))}
            </tbody>
          </table>
          <div className="ototal">合計（税抜）：¥{fmt(totalEx)}　／　合計（税込）：¥{fmt(Math.round(totalEx*1.1))}</div>
          <div style={{marginTop:9}}><div style={{fontSize:12,fontWeight:600,marginBottom:3}}>備考</div><div className="onote">{note||'（備考なし）'}</div></div>
          {sample&&<div style={{marginTop:9,fontSize:12,background:'#fff8e1',padding:8,borderRadius:6}}>【サンプルキット】45cm×45cm試し塗り用板2枚 / MURA WALL{mode==='exterior'?' EX':''}フィニッシュ150g×1缶</div>}
        </div>
        <div className="no-print" style={{marginTop:14}}>
          <div className="ctitle" style={{fontSize:13,marginBottom:8}}>補足情報</div>
          <div className="frow-2"><div className="frow"><label className="flabel">色No.</label><input className="finput" value={colorNo} onChange={e=>setColorNo(e.target.value)} placeholder="例：305" /></div><div className="frow"><label className="flabel">希望納期</label><input className="finput" type="date" value={delivDate} onChange={e=>setDelivDate(e.target.value)} /></div></div>
          <div className="frow"><label className="flabel">送り先・販売店名</label><input className="finput" value={vendor} onChange={e=>setVendor(e.target.value)} placeholder="例：○○建材" /></div>
          <div className="frow"><label className="flabel">マイスター登録番号</label><input className="finput" value={meister} onChange={e=>setMeister(e.target.value)} placeholder="登録番号" /></div>
          <div className="frow"><label className="flabel">備考</label><textarea className="finput" rows={3} value={note} onChange={e=>setNote(e.target.value)} placeholder="特記事項" /></div>
          <div className="frow" style={{display:'flex',alignItems:'center',gap:10}}><label style={{fontSize:13,fontWeight:600,flexShrink:0}}>サンプルキット</label><div className="rbg" style={{flex:1}}><div className={`rb${!sample?' on':''}`} onClick={()=>setSample(false)}>不要</div><div className={`rb${sample?' on':''}`} onClick={()=>setSample(true)}>要</div></div></div>
          <div className="btngrp" style={{marginTop:8}}>
            <button className="btn btn-p" onClick={()=>window.print()}>🖨️ PDF保存 / 印刷</button>
            <button className="btn btn-g" onClick={onClose}>閉じる</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// メインアプリ
// ============================================================
function App(){
  const [activeTab,setActiveTab]=useState('sim');
  const [mode,setMode]=useState('interior');
  const [area,setArea]=useState('');
  const [clear,setClear]=useState('none');
  const [taxMode,setTaxMode]=useState('ex');
  const [overrides,setOverrides]=useState({});
  const [field,setField]=useState({siteName:'',siteAddr:'',delivDate:''});
  const [showManual,setShowManual]=useState(false);
  const [showOrder,setShowOrder]=useState(false);
  const [saves,setSaves]=useState(()=>{try{return JSON.parse(localStorage.getItem('mw_saves')||'[]')}catch{return[]}});
  const [stocks,setStocks]=useState(()=>{try{return JSON.parse(localStorage.getItem('mw_stocks')||'[]')}catch{return[]}});

  // stocksをlocalStorageに同期
  const updateStocks=(next)=>{
    setStocks(next);
    localStorage.setItem('mw_stocks',JSON.stringify(next));
  };

  const areaNum=parseFloat(area)||0;
  const steps=useMemo(()=>buildSteps(mode,areaNum,clear),[mode,areaNum,clear]);
  const totals=useMemo(()=>calcTotals(steps,overrides,areaNum),[steps,overrides,areaNum]);
  const displayTotal=taxMode==='inc'?Math.round(totals.purchase*1.1):totals.purchase;
  const displayJob=taxMode==='inc'?Math.round(totals.jobCost*1.1):totals.jobCost;

  const getQty=(row)=>overrides[row.key]!==undefined?overrides[row.key]:row.qty;

  const setQtyDelta=(key,d)=>{
    setOverrides(prev=>{
      const base=steps.flatMap(s=>s.rows).find(r=>r.key===key)?.qty||0;
      const cur=prev[key]!==undefined?prev[key]:base;
      return{...prev,[key]:Math.max(0,cur+d)};
    });
  };
  const setQtyDirect=(key,val)=>{
    const n=parseInt(val,10);
    setOverrides(prev=>({...prev,[key]:isNaN(n)||n<0?0:n}));
  };

  const handleModeChange=(m)=>{setMode(m);setOverrides({});};

  const handleAddStock=(row,qty,sp)=>{
    const m=row.mat;
    const item={
      id:Date.now()+Math.random(),
      matName:m.name, matSize:m.size,
      remainSqm:parseFloat(sp.surplusSqm.toFixed(1)),
      unitValue:m.price/m.coverage,
      fromSite:field.siteName||'現場名未入力',
      date:new Date().toLocaleDateString('ja-JP'),
      memo:'',
    };
    updateStocks([item,...stocks].slice(0,50));
    alert(`「${m.name}」を在庫に追加しました`);
  };

  const handleSave=()=>{
    if(!areaNum){alert('施工面積を入力してください');return;}
    const item={id:Date.now(),mode,area:areaNum,clear,field:{...field},overrides:{...overrides},total:totals.purchase,date:new Date().toLocaleDateString('ja-JP'),label:field.siteName||`${mode==='interior'?'内装':'外装'} ${areaNum}㎡`};
    const next=[item,...saves].slice(0,30);
    setSaves(next);
    localStorage.setItem('mw_saves',JSON.stringify(next));
    alert('保存しました');
  };
  const handleLoad=(item)=>{setMode(item.mode);setArea(String(item.area));setClear(item.clear);setField(item.field);setOverrides(item.overrides);setActiveTab('sim');};
  const handleDeleteSave=(id)=>{if(!confirm('削除しますか？'))return;const next=saves.filter(s=>s.id!==id);setSaves(next);localStorage.setItem('mw_saves',JSON.stringify(next));};

  const handleCopy=()=>{
    const lines=steps.flatMap(s=>[s.title,...s.rows.map(r=>`  ${r.mat.name}（${r.mat.size}）× ${getQty(r)}${r.mat.unit}　¥${fmt(r.mat.price*getQty(r))}`)]);
    lines.push(`\n合計（税抜）：¥${fmt(totals.purchase)}`);
    if(totals.hasSurplus) lines.push(`この現場の実質費用：¥${fmt(totals.jobCost)}`);
    navigator.clipboard.writeText(lines.join('\n'));
    alert('コピーしました');
  };

  const sqmPrice=areaNum>0?Math.round((totals.hasSurplus?totals.jobCost:totals.purchase)/areaNum):0;

  return(
    <div>
      {/* ヘッダー */}
      <div className="hdr">
        <h1>🏠 MURA WALL 材料費シミュレーター</h1>
        <p>Cement Artist Nu☆Man｜株式会社KENSIN</p>
      </div>

      {/* メインタブ */}
      <div className="tabs no-print">
        {[['sim','⚙️ シミュレーター'],['price','💰 単価表'],['stock',`📦 在庫(${stocks.length})`],['saves','📁 保存']].map(([k,l])=>(
          <button key={k} className={`tab${activeTab===k?' on':''}`} onClick={()=>setActiveTab(k)}>{l}</button>
        ))}
      </div>

      <div className="wrap">

        {/* ===== シミュレーター ===== */}
        {activeTab==='sim'&&(
          <>
            {/* 製品選択 */}
            <div className="card">
              <div className="ctitle">製品選択</div>
              <div className="rbg">
                <div className={`rb${mode==='interior'?' on':''}`} onClick={()=>handleModeChange('interior')}>内装 MURA WALL</div>
                <div className={`rb${mode==='exterior'?' on':''}`} onClick={()=>handleModeChange('exterior')}>外装 MURA WALL EX</div>
              </div>
            </div>

            {/* 現場情報 */}
            <div className="card">
              <div className="ctitle">現場情報</div>
              <div className="frow"><label className="flabel">施工物件名</label><input className="finput" value={field.siteName} onChange={e=>setField({...field,siteName:e.target.value})} placeholder="例：○○様邸" /></div>
              <div className="frow"><label className="flabel">施工物件住所</label><input className="finput" value={field.siteAddr} onChange={e=>setField({...field,siteAddr:e.target.value})} placeholder="例：三重県松阪市" /></div>
              <div className="frow"><label className="flabel">希望納期</label><input className="finput" type="date" value={field.delivDate} onChange={e=>setField({...field,delivDate:e.target.value})} /></div>
            </div>

            {/* 施工条件 */}
            <div className="card">
              <div className="ctitle">施工条件</div>
              <div className="frow">
                <label className="flabel">施工面積</label>
                <div className="area-wrap">
                  <input className="area-in" type="number" value={area} onChange={e=>{setArea(e.target.value);setOverrides({})}} placeholder="0" min="0" step="0.5" />
                  <span style={{fontSize:18,fontWeight:600,color:'var(--text-sub)'}}>㎡</span>
                </div>
              </div>
              <div className="frow">
                <label className="flabel">クリヤー仕上げ（オプション）</label>
                <div className="rbg">
                  {[['none','なし'],['gloss','艶あり'],['matte','艶消し']].map(([k,l])=>(
                    <div key={k} className={`rb${clear===k?' on':''}`} onClick={()=>setClear(k)}>{l}</div>
                  ))}
                </div>
                {clear!=='none'&&mode==='interior'&&(
                  <div className="warn"><span>⚠️</span><span>内装にクリヤーを使用すると<strong>国土交通大臣認定防火材料の対象外</strong>になります。</span></div>
                )}
              </div>
            </div>

            {/* 材料リスト */}
            {areaNum>0&&steps.length>0&&(
              <>
                <div className="card">
                  <div className="ctitle">材料リスト（数量を直接編集できます）</div>
                  {steps.map((step,si)=>(
                    <div key={si} style={{marginBottom:14}}>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--text-sub)',marginBottom:7,padding:'4px 0',borderBottom:'1px solid var(--border)'}}>{step.title}</div>
                      {step.rows.map((row,ri)=>{
                        const qty=getQty(row);
                        const m=row.mat;
                        const covUnit=m.coverage;
                        const covTotal=covUnit?covUnit*qty:null;
                        const pct=covUnit&&covTotal?Math.min(100,areaNum/covTotal*100):null;
                        const sp=calcSurplus(row,qty,areaNum);
                        return(
                          <div className="mat-card" key={ri}>
                            <div className="mat-head">
                              <div className="mat-name">
                                <div className="name">{m.name}</div>
                                <div className="size">{m.size}</div>
                                {covUnit&&<div className="cov">1{m.unit}で {covUnit}㎡施工可能{covTotal?` ／ ${qty}${m.unit}で ${covTotal.toFixed(1)}㎡カバー`:''}</div>}
                              </div>
                              <div className="mat-ctrl">
                                <button className="qbtn" onClick={()=>setQtyDelta(row.key,-1)}>−</button>
                                <input
                                  className="qinput"
                                  type="number" min="0"
                                  value={qty}
                                  onChange={e=>setQtyDirect(row.key,e.target.value)}
                                />
                                <span className="qunit">{m.unit}</span>
                                <button className="qbtn" onClick={()=>setQtyDelta(row.key,1)}>+</button>
                              </div>
                              <div className="mat-price">¥{fmt(m.price*qty)}</div>
                            </div>

                            {/* カバレッジバー */}
                            {covUnit&&qty>0&&(
                              <div className="cov-bar-wrap">
                                <div className="cov-label">
                                  <span>施工面積 {areaNum}㎡ に対して {covTotal?.toFixed(1)}㎡分購入</span>
                                  <span>{pct?.toFixed(0)}%使用</span>
                                </div>
                                <div className="cov-bar">
                                  <div className="cov-bar-fill over" style={{width:`${pct}%`}} />
                                </div>
                              </div>
                            )}

                            {/* 余り試算 */}
                            {sp&&(
                              <div className="surplus-box">
                                <div className="surplus-title">
                                  <span>📊 余り材料試算</span>
                                  <span style={{fontSize:10,fontWeight:400,color:'#888'}}>購入 → 余りが次の現場へ</span>
                                </div>
                                <div className="surplus-row"><span className="surplus-label">購入合計</span><span className="surplus-val">¥{fmt(sp.cost)}</span></div>
                                <div className="surplus-row"><span className="surplus-label">この現場の実質費用</span><span className="surplus-val green">¥{fmt(sp.jobCost)}</span></div>
                                <div className="surplus-row"><span className="surplus-label">余り施工可能面積</span><span className="surplus-val gray">{sp.surplusSqm.toFixed(1)}㎡</span></div>
                                <div className="surplus-row"><span className="surplus-label">余り材料の残存価値</span><span className="surplus-val gray">¥{fmt(sp.surplusVal)}</span></div>
                                <button className="add-stock-btn" onClick={()=>handleAddStock(row,qty,sp)}>＋ 在庫に追加</button>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>

                {/* 合計ボックス */}
                <div className="total-box no-print">
                  <div className="ttax">
                    <button className={`ttax-btn${taxMode==='ex'?' on':''}`} onClick={()=>setTaxMode('ex')}>税抜</button>
                    <button className={`ttax-btn${taxMode==='inc'?' on':''}`} onClick={()=>setTaxMode('inc')}>税込（10%）</button>
                  </div>
                  <div className="trow"><span className="lbl">材料費（購入合計）</span><span className="val">¥{fmt(displayTotal)}</span></div>
                  {totals.hasSurplus&&(
                    <div className="surplus-summary">
                      <div className="row"><span className="lbl">うち この現場の実質費用</span><span className="val">¥{fmt(displayJob)}</span></div>
                      <div className="row"><span className="lbl">余り材料の残存価値</span><span className="val">¥{fmt(taxMode==='inc'?Math.round(totals.surplusVal*1.1):totals.surplusVal)}</span></div>
                    </div>
                  )}
                  <div className="tdiv"/>
                  <div className="trow"><span className="lbl">合計（{taxMode==='inc'?'税込':'税抜'}）</span><span className="val big">¥{fmt(displayTotal)}</span></div>
                  {totals.hasSurplus&&(
                    <div className="trow" style={{marginTop:8,background:'rgba(74,222,128,.15)',borderRadius:7,padding:'8px 10px'}}>
                      <span style={{fontSize:13}}>✅ この現場の実質材料費</span>
                      <span style={{fontSize:18,fontWeight:800,color:'#4ade80'}}>¥{fmt(displayJob)}</span>
                    </div>
                  )}
                  <div className="tsqm">㎡単価（{totals.hasSurplus?'実質費用':'購入合計'}ベース）：¥{fmt(sqmPrice)}/㎡　｜　{areaNum}㎡</div>
                </div>

                {/* ボタン群 */}
                <div className="btngrp no-print">
                  <button className="btn btn-p" onClick={()=>setShowOrder(true)}>📋 発注書を発行</button>
                  <button className="btn btn-s" onClick={handleSave}>💾 保存</button>
                </div>
                <div className="btngrp no-print">
                  <button className="btn btn-g" onClick={handleCopy}>📋 テキストコピー</button>
                </div>
              </>
            )}

            {/* 施工要領 */}
            <div className="coll no-print">
              <div className="coll-hd" onClick={()=>setShowManual(!showManual)}>
                📖 施工要領を確認する（詳細版）
                <span className={`coll-arr${showManual?' op':''}`}>▼</span>
              </div>
              {showManual&&<div className="coll-bd">{mode==='interior'?<ManualSection mode={mode}/>:<ManualSectionEX/>}</div>}
            </div>
          </>
        )}

        {/* ===== 単価表 ===== */}
        {activeTab==='price'&&(
          <div className="card"><div className="ctitle">材料単価表（全材料）</div><PriceTab /></div>
        )}

        {/* ===== 在庫 ===== */}
        {activeTab==='stock'&&(
          <div className="card">
            <div className="ctitle">在庫一覧（余り材料）</div>
            <StockTab stocks={stocks} setStocks={updateStocks} />
          </div>
        )}

        {/* ===== 保存 ===== */}
        {activeTab==='saves'&&(
          <div className="card">
            <div className="ctitle">保存済み現場（{saves.length}件）</div>
            {saves.length===0?(
              <div className="empty"><div className="ico">📭</div><div>保存済みデータはありません</div></div>
            ):(
              saves.map(item=>(
                <div key={item.id} style={{background:'#fff',border:'1.5px solid var(--border)',borderRadius:8,padding:12,marginBottom:9,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontWeight:600,fontSize:14}}>{item.label}</div>
                    <div style={{fontSize:12,color:'var(--text-sub)',marginTop:2}}>{item.mode==='interior'?'内装':'外装'} / {item.area}㎡ / ¥{fmt(item.total)} / {item.date}</div>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    <button style={{padding:'6px 10px',border:'1.5px solid var(--border)',borderRadius:6,background:'#fff',fontSize:12,cursor:'pointer'}} onClick={()=>handleLoad(item)}>読込</button>
                    <button style={{padding:'6px 10px',border:'1.5px solid #fecaca',borderRadius:6,background:'#fff',fontSize:12,cursor:'pointer',color:'var(--red)'}} onClick={()=>handleDeleteSave(item.id)}>削除</button>
                  </div>
                </div>
              ))
            )}
          </div>
        )}
      </div>

      {/* 発注書モーダル */}
      {showOrder&&<OrderModal mode={mode} steps={steps} overrides={overrides} field={field} onClose={()=>setShowOrder(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
